<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day 4 - Photo Gallery Structure</title>
  <style>
    body { font-family: "Segoe UI", Tahoma, sans-serif; margin: 2rem; }
    .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
    img { width: 100%; border-radius: 0.4rem; }
    figcaption { margin-top: 0.35rem; font-size: 0.95rem; }
  </style>
</head>
<body>
  <h1>Photo Gallery</h1>
  <section class="gallery">
    <figure><img src="images\kevin-charit-7qagGaQrJks-unsplash.jpg" alt="Placeholder image 1"><figcaption>Caption 1</figcaption></figure>
    <figure><img src="images\kevin-charit-YfkSElR8Fdg-unsplash.jpg" alt="Placeholder image 2"><figcaption>Caption 2</figcaption></figure>
    <figure><img src="images\leon-rohrwild-dFQFgz1x2No-unsplash.jpg" alt="Placeholder image 3"><figcaption>Caption 3</figcaption></figure>
    <figure><img src="images\maeva-vigier-o1v9BTwrL1A-unsplash.jpg" alt="Placeholder image 4"><figcaption>Caption 4</figcaption></figure>
    <figure><img src="images\logan-weaver-lgnwvr-f3W2GKEJFIE-unsplash.jpg" alt="Placeholder image 5"><figcaption>Caption 5</figcaption></figure>
    <figure><img src="images\xandro-vandewalle-uaHQoE-rUL0-unsplash.jpg" alt="Placeholder image 6"><figcaption>Caption 6</figcaption></figure>
  </section>
  <footer>
    <p>&copy; 2026 Dennis Waweru</p>
  </footer>
</body>
</html>
